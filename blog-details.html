      author: "Maria Santos",
      authorBio: "Ethical trade coordinator",
      content: `\n        <p>Behind every bamboo garment is a community of skilled artisans. We're proud to work directly with women-led cooperatives in rural Vietnam and India, ensuring fair wages, safe conditions, and skills training.</p>\n        \n        <h2>Preserving Traditional Craftsmanship</h2>\n        <p>Our bamboo weaving techniques draw on generations of knowledge. Artisans hand-finish each garment — checking seams, attaching buttons, and ensuring quality. This attention to detail can't be replicated by machines.</p>\n        \n        <div class="highlight-box">\n          <i class="fas fa-hands" style="color: var(--electric-blue); font-size: 1.5rem; margin-bottom: 0.5rem; display: inline-block;"></i>\n          <p><strong>Fair Trade Certified:</strong> All our production partners meet strict fair trade standards, including living wages, healthcare access, and democratic workplace decision-making.</p>\n        </div>\n        \n        <h3>Meet Mai — Master Weaver</h3>\n        <p>Mai has been working with bamboo textiles for 22 years. She now trains younger women in her village, passing on techniques that her grandmother taught her. "Bamboo is part of our heritage," she says. "I'm proud that our traditional knowledge is valued around the world."</p>\n        \n        <p>When you buy from Bamboo Essence, you're not just getting a product — you're supporting a global community of artisans. Every purchase provides 3 days of fair wages for one artisan.</p>\n      `
    }
  };

  // Default fallback content
  const defaultBlog = {
    title: "The Beauty of Sustainable Bamboo",
    category: "Sustainability",
    date: "March 2026",
    readTime: "5 min read",
    image: "https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1974&auto=format",
    author: "Bamboo Essence Team",
    authorBio: "Our team is dedicated to sharing eco-conscious stories",
    content: `<p>Thank you for reading our blog. This article is filled with insights about sustainable bamboo fashion and how you can make a positive impact through your clothing choices. Stay tuned for more stories on circular economy, ethical production, and regenerative materials.</p>`
  };

  // Get blog data from URL parameters
  function getBlogFromURL() {
    const urlParams = new URLSearchParams(window.location.search);
    const title = urlParams.get('title');
    if (title) {
      const decodedTitle = decodeURIComponent(title);
      return blogDatabase[decodedTitle] || null;
    }
    return null;
  }

  // Render blog details
  function renderBlogDetails(blog) {
    if (!blog) {
      renderError();
      return;
    }

    const html = `
      <div class="blog-detail-card">
        <div class="hero-image-wrapper">
          <img class="hero-image" src="${blog.image}" alt="${blog.title}" onerror="this.src='https://images.unsplash.com/photo-1539109136881-3be0616acf4b?q=80&w=1974&auto=format'">
          <div class="image-overlay">
            <span class="category-badge"><i class="fas fa-leaf"></i> ${blog.category}</span>
          </div>
        </div>
        <div class="post-content">
          <h1 class="post-title">${escapeHtml(blog.title)}</h1>
          <div class="post-meta">
            <span><i class="fas fa-calendar-alt"></i> ${blog.date}</span>
            <span><i class="fas fa-clock"></i> ${blog.readTime}</span>
            <span><i class="fas fa-tag"></i> ${blog.category}</span>
          </div>
          <div class="post-body">
            ${blog.content}
          </div>
          
          <div class="author-section">
            <div class="author-avatar">
              <i class="fas fa-user"></i>
            </div>
            <div class="author-info">
              <h4>${escapeHtml(blog.author)}</h4>
              <p>${escapeHtml(blog.authorBio)}</p>
            </div>
          </div>
          
          <div class="share-section">
            <span><i class="fas fa-share-alt"></i> Share this article:</span>
            <div class="share-buttons">
              <a href="#" class="share-btn" onclick="shareArticle('twitter')"><i class="fab fa-twitter"></i></a>
              <a href="#" class="share-btn" onclick="shareArticle('facebook')"><i class="fab fa-facebook-f"></i></a>
              <a href="#" class="share-btn" onclick="shareArticle('linkedin')"><i class="fab fa-linkedin-in"></i></a>
              <a href="#" class="share-btn" onclick="shareArticle('email')"><i class="fas fa-envelope"></i></a>
            </div>
          </div>
          
          <div class="action-buttons">
            <button class="btn-primary" id="backToBlogBtn"><i class="fas fa-arrow-left"></i> Back to Blog</button>
            <button class="btn-secondary" id="subscribeBtn"><i class="fas fa-envelope"></i> Subscribe for Updates</button>
          </div>
        </div>
      </div>
    `;

    document.getElementById('post-container').innerHTML = html;
    
    // Attach event listeners
    document.getElementById('backToBlogBtn')?.addEventListener('click', () => window.close());
    document.getElementById('subscribeBtn')?.addEventListener('click', () => {
      alert("📧 Thanks for subscribing! You'll receive our weekly bamboo newsletter.");
    });
  }

  function renderError() {
    document.getElementById('post-container').innerHTML = `
      <div class="error-state">
        <i class="fas fa-leaf" style="font-size: 3rem; color: var(--electric-blue); margin-bottom: 1rem; display: block;"></i>
        <h2>Article Not Found</h2>
        <p style="margin: 1rem 0;">The blog post you're looking for might have been moved or doesn't exist.</p>
        <button class="btn-primary" onclick="window.close()"><i class="fas fa-arrow-left"></i> Back to Blog</button>
      </div>
    `;
  }

  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
      return c;
    });
  }

  // Share functionality
  window.shareArticle = function(platform) {
    const title = document.querySelector('.post-title')?.innerText || 'Bamboo Essence Article';
    const url = window.location.href;
    let shareUrl = '';
    if (platform === 'twitter') shareUrl = `https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(url)}`;
    else if (platform === 'facebook') shareUrl = `https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`;
    else if (platform === 'linkedin') shareUrl = `https://www.linkedin.com/shareArticle?mini=true&url=${encodeURIComponent(url)}&title=${encodeURIComponent(title)}`;
    else if (platform === 'email') shareUrl = `mailto:?subject=${encodeURIComponent(title)}&body=${encodeURIComponent(`Check out this article: ${url}`)}`;
    if (shareUrl) window.open(shareUrl, '_blank', 'width=600,height=400');
  };

  // Theme for detail page
  function initTheme() {
    const body = document.body;
    const themeBtn = document.getElementById('detail-theme-toggle');
    function updateIcon(isDark) {
      if (themeBtn) themeBtn.innerHTML = isDark ? '<i class="fas fa-sun"></i>' : '<i class="fas fa-moon"></i>';
    }
    if (localStorage.getItem('blogDetailTheme') === 'dark') {
      body.classList.add('dark');
      updateIcon(true);
    } else updateIcon(false);
    themeBtn?.addEventListener('click', () => {
      if (body.classList.contains('dark')) {
        body.classList.remove('dark');
        localStorage.setItem('blogDetailTheme', 'light');
        updateIcon(false);
      } else {
        body.classList.add('dark');
        localStorage.setItem('blogDetailTheme', 'dark');
        updateIcon(true);
      }
    });
  }

  // Close button
  function initCloseButton() {
    document.getElementById('detail-close-btn')?.addEventListener('click', () => window.close());
    document.getElementById('homeLink')?.addEventListener('click', (e) => { e.preventDefault(); window.close(); });
  }

  // Initialize page
  function init() {
    initTheme();
    initCloseButton();
    const blogData = getBlogFromURL();
    if (blogData) renderBlogDetails(blogData);
    else renderError();
  }

  init();
</script>
</body>
</html>
