<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="description" content="Page not found - Bamboo Essence Sustainable Apparel">
    <title>404 | Page Not Found - Bamboo Essence</title>
    <link rel="icon" href="/images/fav.png" type="image/jpeg">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,400&family=Merriweather:ital,wght@0,300;0,400;0,700;0,900;1,400&display=swap" rel="stylesheet">
    
    <style>
        /* ===== BAMBOO ESSENCE COLOR THEME (exact match from index.html) ===== */
        :root {
            --bg-primary: #FFFFFF;
            --bg-secondary: #F5F7F0;
            --text-primary: #1A2E24;
            --text-secondary: #3A5E4C;
            --text-muted: #6B8E7A;
            --border-color: #DCE8D5;
            --electric-blue: #2A9D8F;
            --electric-blue-light: #52B4A6;
            --electric-blue-dark: #1E7A6E;
            --shadow: 0 10px 30px rgba(0,0,0,0.06);
            --nav-text: #F0F7E6;
            --accent-soft: rgba(42, 157, 143, 0.12);
            --gradient-leaf: linear-gradient(135deg, #0D2E24 0%, #2A9D8F 100%);
        }

        [data-theme="dark"] {
            --bg-primary: #121E18;
            --bg-secondary: #0A1812;
            --text-primary: #E6F0EA;
            --text-secondary: #BED9CE;
            --text-muted: #8EAD9E;
            --border-color: #2D463A;
            --electric-blue: #3AAFA0;
            --electric-blue-dark: #2C8E82;
            --shadow: 0 10px 30px rgba(0,0,0,0.4);
            --accent-soft: rgba(58, 175, 160, 0.15);
            --gradient-leaf: linear-gradient(135deg, #0D2E24 0%, #2A9D8F 100%);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            transition: background 0.3s, color 0.3s;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* NO SCROLL - body fixed, no overflow */
        html {
            overflow: hidden;
            height: 100%;
        }

        .font-serif {
            font-family: 'Merriweather', serif;
        }
        
        .text-accent {
            color: var(--electric-blue);
        }

        /* Logo in top-left corner - EXACT SAME AS INDEX.HTML */
        .logo-container {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 100;
            padding: 28px 32px;
        }

        .nav-logo-text {
            font-size: 1.8rem !important;
            font-weight: 700 !important;
            color: var(--electric-blue-dark);
            text-decoration: none;
            letter-spacing: -0.5px;
            display: inline-block;
            line-height: 1;
            background: transparent;
        }

        [data-theme="dark"] .nav-logo-text {
            color: var(--electric-blue);
        }

        .nav-logo-text span {
            color: var(--electric-blue);
            font-style: italic;
            font-family: 'Merriweather', serif;
        }

        [data-theme="dark"] .nav-logo-text span {
            color: #5EEAD4;
        }

        /* Theme toggle button (small, top-right) */
        .theme-toggle-corner {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 100;
        }

        .icon-btn {
            width: 42px;
            height: 42px;
            background: var(--accent-soft);
            border: 1px solid var(--border-color);
            border-radius: 40px;
            color: var(--text-primary);
            cursor: pointer;
            font-size: 1.2rem;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(4px);
        }

        .icon-btn:hover {
            background: var(--electric-blue);
            color: white;
            transform: scale(1.02);
        }

        /* Main 404 Content - Centered perfectly */
        .error-container {
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem;
        }

        .error-card {
            text-align: center;
            max-width: 600px;
            width: 100%;
            padding: 3rem 2rem;
            background: var(--bg-primary);
            border-radius: 48px;
            border: 1px solid var(--border-color);
            box-shadow: var(--shadow);
            transition: all 0.3s ease;
            animation: fadeInUp 0.6s ease-out;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-card:hover {
            border-color: var(--electric-blue);
            transform: translateY(-4px);
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }

        /* Bamboo Illustration */
        .bamboo-icon {
            font-size: 5rem;
            color: var(--electric-blue);
            margin-bottom: 1rem;
            display: inline-block;
            animation: gentleSway 3s ease-in-out infinite;
        }

        @keyframes gentleSway {
            0%, 100% { transform: rotate(0deg); }
            50% { transform: rotate(8deg); }
        }

        .error-code {
            font-size: 7rem;
            font-weight: 800;
            font-family: 'Merriweather', serif;
            background: var(--gradient-leaf);
            background-clip: text;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1;
            margin-bottom: 0.5rem;
        }

        .error-title {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text-primary);
            margin-bottom: 1rem;
        }

        .error-message {
            color: var(--text-secondary);
            font-size: 1rem;
            line-height: 1.6;
            margin-bottom: 2rem;
        }

        /* Action Buttons */
        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .btn-primary {
            background: var(--electric-blue);
            color: white;
            padding: 0.85rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-primary:hover {
            background: var(--electric-blue-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(42,157,143,0.3);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid var(--electric-blue);
            color: var(--electric-blue);
            padding: 0.85rem 2rem;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .btn-outline:hover {
            background: var(--accent-soft);
            transform: translateY(-2px);
        }

        /* Quick Links */
        .quick-links {
            margin-top: 2rem;
            padding-top: 1.5rem;
            border-top: 1px solid var(--border-color);
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            flex-wrap: wrap;
        }

        .quick-links a {
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.8rem;
            transition: color 0.2s;
        }

        .quick-links a:hover {
            color: var(--electric-blue);
        }

        /* Footer note - minimal */
        .footer-note {
            position: fixed;
            bottom: 16px;
            left: 0;
            right: 0;
            text-align: center;
            font-size: 0.7rem;
            color: var(--text-muted);
            z-index: 100;
            pointer-events: none;
        }

        /* RTL Support */
        [dir="rtl"] .logo-container {
            left: auto;
            right: 0;
        }

        [dir="rtl"] .theme-toggle-corner {
            right: auto;
            left: 24px;
        }

        /* Responsive adjustments */
        @media (max-width: 640px) {
            .logo-container {
                padding: 20px 24px;
            }
            .nav-logo-text {
                font-size: 1.4rem !important;
            }
            .error-code {
                font-size: 5rem;
            }
            .error-title {
                font-size: 1.4rem;
            }
            .action-buttons {
                flex-direction: column;
                align-items: stretch;
            }
            .btn-primary, .btn-outline {
                justify-content: center;
            }
            .error-card {
                padding: 2rem 1.5rem;
                margin: 0 1rem;
            }
        }

        @media (max-width: 480px) {
            .logo-container {
                padding: 16px 20px;
            }
            .nav-logo-text {
                font-size: 1.2rem !important;
            }
            .theme-toggle-corner {
                top: 16px;
                right: 16px;
            }
            .icon-btn {
                width: 36px;
                height: 36px;
                font-size: 1rem;
            }
        }
    </style>
</head>
<body>

    <!-- Logo in Top-Left Corner - EXACT SAME AS INDEX.HTML -->
    <div class="logo-container">
        <a href="index.html" class="nav-logo-text"><span>Bamboo Essence</span></a>
    </div>

    <!-- Theme Toggle Button (Top-Right Corner) -->
    <div class="theme-toggle-corner">
        <button id="theme-toggle" class="icon-btn" title="Switch Theme">
            <i class="fas fa-moon"></i>
        </button>
    </div>

    <!-- Main 404 Content - Perfectly Centered, No Scroll -->
    <div class="error-container">
        <div class="error-card">
            <!-- Bamboo Leaf Icon -->
            <div class="bamboo-icon">
                <i class="fas fa-leaf"></i>
            </div>
            
            <!-- 404 Error Code with Gradient -->
            <div class="error-code">404</div>
            
            <!-- Error Title -->
            <h1 class="error-title font-serif">Page Not Found</h1>
            
            <!-- Friendly Error Message -->
            <p class="error-message">
                Oops! The bamboo path you're looking for seems to have wandered off into the forest.<br>
                Don't worry, let's get you back on track.
            </p>
            
            <!-- Action Buttons -->
            <div class="action-buttons">
                <a href="index.html" class="btn-primary">
                    <i class="fas fa-home"></i> Back to Home
                </a>
                <a href="#" onclick="history.back(); return false;" class="btn-outline">
                    <i class="fas fa-arrow-left"></i> Go Back
                </a>
            </div>
            
            <!-- Quick Help Links -->
            <div class="quick-links">
                <a href="index.html#collections">Shop Collection</a>
                <a href="contact.html">Contact Support</a>
                <a href="index.html#faq">FAQs</a>
            </div>
        </div>
    </div>

    <!-- Minimal Footer Note -->
    <div class="footer-note">
        <span>🌿 Sustainable fashion — every path leads to bamboo</span>
    </div>

    <script>
        (function() {
            const htmlEl = document.documentElement;
            const themeToggle = document.getElementById('theme-toggle');
            
            // Set initial theme from localStorage or default light
            function setTheme(theme) { 
                htmlEl.setAttribute('data-theme', theme); 
                localStorage.setItem('bamboo-theme', theme);
                const icon = themeToggle?.querySelector('i');
                if(icon) {
                    if (theme === 'dark') {
                        icon.className = 'fas fa-sun';
                    } else {
                        icon.className = 'fas fa-moon';
                    }
                }
            }
            
            const savedTheme = localStorage.getItem('bamboo-theme') || 'light';
            setTheme(savedTheme);
            
            // Toggle theme on button click
            if(themeToggle) {
                themeToggle.addEventListener('click', () => {
                    const currentTheme = htmlEl.getAttribute('data-theme');
                    const newTheme = currentTheme === 'light' ? 'dark' : 'light';
                    setTheme(newTheme);
                });
            }
            
            // RTL Support - optional (can be toggled but kept minimal for 404)
            // Check if RTL was previously set in other pages, apply for consistency
            const savedDir = localStorage.getItem('bamboo-dir');
            if (savedDir === 'rtl') {
                htmlEl.setAttribute('dir', 'rtl');
            }
            
            // Optional: Add RTL toggle if needed (not visible by default but accessible)
            // For complete consistency, we add a hidden RTL toggle via console? Not needed.
            // The 404 page respects existing RTL setting from main site.
            
            // Prevent any accidental scroll on body
            document.body.addEventListener('touchmove', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            // But allow clicks on buttons and links normally
            // Prevent scroll on wheel
            window.addEventListener('wheel', function(e) {
                e.preventDefault();
            }, { passive: false });
            
            // But we want to allow clicking, so we don't block all events, just scroll
            // This ensures no scrollbar appears
        })();
    </script>
</body>
</html>
